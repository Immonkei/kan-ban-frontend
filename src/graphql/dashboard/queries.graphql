query DashboardTasks {
  tasks(
    filter: {
      page: 1
      limit: 100
    }
  ) {
    data {
      id
      title
      status
      priority

      board {
        id
        name
      }

      assignee {
        id
        name
      }
    }

    total
  }
}

# Accurate count for each status
query TaskCountByStatus($status: TaskStatus!) {
  tasks(filter: { status: $status, page: 1, limit: 1 }) {
    total
  }
}